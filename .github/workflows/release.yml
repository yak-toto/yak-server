name: 🆙 Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        description: Release type
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: telegram_bot

    permissions:
      id-token: write # <-- Required for publishing to PyPI
      contents: write # <-- Enables push
      packages: write # <-- Required for pushing to GHCR

    env:
      python-version: "3.13"
      COMPETITION: "world_cup_2026"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.python-version }}
          enable-cache: false

      - name: Create commits
        id: create-commits
        run: |
          git config user.name 'yak-toto'
          git config user.email 'yaktoto648@gmail.com'
          uv version --bump "${GITHUB_EVENT_INPUTS_RELEASE_TYPE}"
          NEW_VERSION=$(uv version --short)
          uv lock
          git add pyproject.toml uv.lock
          git commit -m "Release ${NEW_VERSION}"
          git tag -a "${NEW_VERSION}" HEAD -m \""${NEW_VERSION}"\"
          echo "new-version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_INPUTS_RELEASE_TYPE: ${{ github.event.inputs.release-type }}

      - name: Push
        uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c # v1.3.0
        with:
          tags: true

      - name: Checkout code
        run: git checkout "${STEPS_CREATE_COMMITS_OUTPUTS_NEW_VERSION}"
        env:
          STEPS_CREATE_COMMITS_OUTPUTS_NEW_VERSION: ${{ steps.create-commits.outputs.new-version }}

      - name: Build distribution
        run: uv build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.create-commits.outputs.new-version }}-${{ env.COMPETITION }}
          build-args: |
            COMPETITION=${{ env.COMPETITION }}

      - name: Create Release
        id: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.create-commits.outputs.new-version }}
        run: |
          RELEASE_URL=$(gh release create "${TAG}" dist/* --generate-notes --title "${TAG}")
          echo "html_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Send Release Notification to Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_TAG: ${{ steps.create-commits.outputs.new-version }}
          RELEASE_URL: ${{ steps.create-release.outputs.html_url }}
          REPO: ${{ github.repository }}
        run: |-
          FULL_MESSAGE="🎉 New Release: ${RELEASE_TAG}
          📁 Repository: ${REPO}
          📦 PyPI: https://pypi.org/project/yak-server/${RELEASE_TAG}/
          🔗 ${RELEASE_URL}"

          curl -s -o /dev/null -S -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"${FULL_MESSAGE}\",
              \"disable_web_page_preview\": true
            }"
